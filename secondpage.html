<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 1100px;
    background: #e9e3dc;
    border-radius: 12px;
    padding: 20px;
}

/* Header */
.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

/* Layout */
.main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* Timeline */
.timeline {
    border-left: 2px solid #333;
    padding-left: 15px;
}

.time {
    margin: 15px 0;
    font-weight: bold;
}

.event {
    background: #fff;
    padding: 5px 10px;
    border-radius: 6px;
    margin-left: 10px;
    display: inline-block;
    cursor: pointer;
}

.add-btn {
    margin-top: 10px;
    padding: 6px 10px;
    cursor: pointer;
}

/* Habit Checklist */
.habits {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.habit {
    display: flex;
    align-items: center;
    cursor: pointer;
}

.dot {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 10px;
}

.habit.active .dot {
    background: red;
}

/* Progress Circle */
.progress {
    margin-top: 20px;
    display: flex;
    justify-content: center;
}

.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: conic-gradient(red 0deg, red 0deg, #ccc 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
}

.inner {
    width: 100px;
    height: 100px;
    background: #e9e3dc;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* Footer */
.footer {
    display: flex;
    justify-content: space-around;
    margin-top: 30px;
    font-weight: bold;
}

/* Responsive */
@media (max-width: 768px) {
    .main {
        grid-template-columns: 1fr;
    }
}

/* ---------- CHICKEN WIDGET ---------- */
.chicken-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    cursor: grab;
    z-index: 9999;
}

.scene {
    position: relative;
    width: 120px;
    height: 200px;
}

/* Chicken */
.chicken {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 55px;
    background: white;
    border-radius: 50%;
    z-index: 2;
    transition: transform 0.3s ease;
}

.chicken::before {
    content: "";
    position: absolute;
    top: -15px;
    left: 20px;
    width: 30px;
    height: 30px;
    background: white;
    border-radius: 50%;
}

.beak {
    position: absolute;
    top: 5px;
    left: 45px;
    width: 0;
    height: 0;
    border-left: 8px solid orange;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
}

/* Eggs */
.eggs {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
}

.egg {
    width: 20px;
    height: 28px;
    background: #fff;
    border-radius: 50% 50% 45% 45%;
    margin: 2px auto;
    animation: drop 0.6s ease-out forwards;
}

@keyframes drop {
    0% {
        transform: translateY(-80px);
        opacity: 0;
    }
    100% {
        transform: translateY(0);
        opacity: 1;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <div>
            <div><strong>TODAY'S DASHBOARD</strong></div>
            <div contenteditable="true" id="date">FEB 23</div>
        </div>
        <div><strong>DAILY PROGRESS</strong></div>
    </div>

    <div class="main">

        <!-- Timeline -->
        <div>
            <div class="timeline" id="timeline"></div>
            <button class="add-btn" onclick="addEvent()">+ Add Event</button>
        </div>

        <!-- Habits + Progress -->
        <div>
            <h3>HABIT CHECKLIST</h3>

            <div class="habits" id="habits">
                <div class="habit"><div class="dot"></div>Habit 1</div>
                <div class="habit"><div class="dot"></div>Habit 2</div>
                <div class="habit"><div class="dot"></div>Habit 3</div>
                <div class="habit"><div class="dot"></div>Habit 4</div>
                <div class="habit"><div class="dot"></div>Habit 5</div>
            </div>

            <div class="progress">
                <div class="circle" id="circle">
                    <div class="inner" id="percentText">0%</div>
                </div>
            </div>
        </div>

    </div>

    <div class="footer">
        <div>WEEKLY VIEW</div>
        <div>MONTH VIEW</div>
    </div>

</div>

<!-- Chicken Widget -->
<div class="chicken-widget" id="chickenWidget">
  <div class="scene">
    <div class="chicken">
      <div class="beak"></div>
    </div>
    <div class="eggs" id="eggs"></div>
  </div>
</div>

<script>
// ---------- HABITS ----------
const habits = document.querySelectorAll(".habit");
const circle = document.getElementById("circle");
const percentText = document.getElementById("percentText");

function updateProgress() {
    const total = habits.length;
    const completed = document.querySelectorAll(".habit.active").length;
    const percent = (completed / total) * 360;
    const percentDisplay = Math.round((completed / total) * 100);

    circle.style.background = `conic-gradient(red ${percent}deg, #ccc ${percent}deg)`;
    percentText.textContent = percentDisplay + "%";
}

habits.forEach((habit, index) => {
    habit.addEventListener("click", () => {
        habit.classList.toggle("active");
        updateProgress();
        localStorage.setItem("habit-" + index, habit.classList.contains("active"));
    });

    if (localStorage.getItem("habit-" + index) === "true") {
        habit.classList.add("active");
    }
});

updateProgress();

// ---------- TIMELINE ----------
const timeline = document.getElementById("timeline");

function saveTimeline() {
    localStorage.setItem("timeline-data", timeline.innerHTML);
}

function loadTimeline() {
    const data = localStorage.getItem("timeline-data");
    if (data) {
        timeline.innerHTML = data;
        attachEventListeners();
    } else {
        timeline.innerHTML = `
            <div class="time">8AM <span class="event">Event</span></div>
            <div class="time">12PM <span class="event">Lunch</span></div>
        `;
        attachEventListeners();
    }
}

function attachEventListeners() {
    document.querySelectorAll(".event").forEach(event => {
        event.onclick = () => {
            const text = prompt("Edit event:", event.textContent);
            if (text === "") {
                event.remove();
            } else if (text !== null) {
                event.textContent = text;
            }
            saveTimeline();
        };
    });
}

function addEvent() {
    const time = prompt("Enter time (e.g. 3PM):");
    const text = prompt("Event name:");

    if (!time || !text) return;

    const div = document.createElement("div");
    div.className = "time";
    div.innerHTML = `${time} <span class="event">${text}</span>`;
    timeline.appendChild(div);

    attachEventListeners();
    saveTimeline();
}

loadTimeline();

// ---------- DATE ----------
const dateEl = document.getElementById("date");
dateEl.addEventListener("input", () => {
    localStorage.setItem("date", dateEl.textContent);
});

const savedDate = localStorage.getItem("date");
if (savedDate) dateEl.textContent = savedDate;

// ---------- CHICKEN EGGS (STACK + MOVE + RESET) ----------
const eggsContainer = document.getElementById("eggs");
const chicken = document.querySelector(".chicken");

let eggCount = 0;
const maxEggs = 10;
const liftPerEgg = 5;

function layEgg() {
    const egg = document.createElement("div");
    egg.classList.add("egg");

    eggsContainer.insertBefore(egg, eggsContainer.firstChild);

    eggCount++;

    const lift = eggCount * liftPerEgg;
    chicken.style.transform = `translateX(-50%) translateY(-${lift}px)`;

    if (eggCount < maxEggs) {
        setTimeout(layEgg, 800);
    } else {
        setTimeout(resetEggs, 1200);
    }
}

function resetEggs() {
    eggsContainer.innerHTML = "";
    eggCount = 0;
    chicken.style.transform = `translateX(-50%) translateY(0)`;
    setTimeout(layEgg, 800);
}

layEgg();

// ---------- DRAG ----------
const widget = document.getElementById("chickenWidget");

let isDragging = false;
let offsetX, offsetY;

widget.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - widget.offsetLeft;
    offsetY = e.clientY - widget.offsetTop;
    widget.style.cursor = "grabbing";
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    widget.style.left = (e.clientX - offsetX) + "px";
    widget.style.top = (e.clientY - offsetY) + "px";
    widget.style.bottom = "auto";
    widget.style.right = "auto";
});

document.addEventListener("mouseup", () => {
    isDragging = false;
    widget.style.cursor = "grab";
});
</script>

</body>
</html>
